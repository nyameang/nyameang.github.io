{% comment %}
@param {Boolean} center
{% endcomment %}

{% if include.center %}

<div class="list-inline text-center">
{% else %}
<div class="list-inline">
{% endif %}

  <!-- GitHub -->

{% if site.sns.github_username %} <a target="_blank" href="https://github.com/{{ site.sns.github_username }}"> <span class="fa-stack fa-lg"> <i class="fas fa-circle fa-stack-2x"></i> <i class="fab fa-github-alt fa-stack-1x fa-inverse"></i> </span> </a>
{% endif %}

  <!-- Instagram -->

{% if site.sns.instagram_username %} <a target="_blank" href="https://instagram.com/{{ site.sns.instagram_username }}"> <span class="fa-stack fa-lg"> <i class="fas fa-circle fa-stack-2x"></i> <i class="fab fa-instagram fa-stack-1x fa-inverse"></i> </span> </a>
{% endif %}

  <!-- Email -->

{% if site.sns.email_address %}
<a target="_blank" href="https://mail.google.com/mail/?view=cm&to={{ site.sns.email_address }}">
  <span class="fa-stack fa-lg">
    <i class="fas fa-circle fa-stack-2x"></i>
    <i class="fas fa-envelope fa-stack-1x fa-inverse"></i>
  </span>
</a>
{% endif %}

</div>
